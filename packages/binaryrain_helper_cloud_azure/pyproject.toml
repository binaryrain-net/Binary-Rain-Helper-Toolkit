[project]
name = "binaryrain-helper-cloud-azure"
version = "1.0.11"
description = "Aims to simplify and help with commonly used functions in the azure cloud data areas."
readme = "README.md"
authors = [{ name = "Binary Rain" }, { name = "Marcel T.O" }]
requires-python = ">=3.12"
dependencies = [
    "azure-functions",
    "azure-identity",
    "azure-storage-blob",
    "azure-keyvault-secrets",
    "azure-mgmt-datafactory",
]

keywords = ["binary rain", "common", "help", "functions", "azure"]

classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://binaryrain-net.github.io/Binary-Rain-Helper-Toolkit/"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["binaryrain_helper_cloud_azure"]
package-dir = { "" = "src" }

[tool.ruff]
# Extend the settings from the ruff.toml file.
extend = "../../ruff.toml"
