[project]
name = "binaryrain-helper-cloud-aws"
version = "1.0.14"
description = "Aims to simplify and help with commonly used functions in the aws cloud data areas."
readme = "README.md"
authors = [{ name = "Binary Rain" }, { name = "Marcel T.O" }]
requires-python = ">=3.12"
dependencies = [
    "aws-lambda-powertools[tracer]",
    "urllib3", # is a dependency of boto3, but we need to specify it explicitly to avoid CVE
    "boto3",
]

keywords = ["binary rain", "common", "help", "functions", "aws"]

classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://binaryrain-net.github.io/Binary-Rain-Helper-Toolkit/"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["binaryrain_helper_cloud_aws"]
package-dir = { "" = "src" }

[tool.ruff]
# Extend the settings from the ruff.toml file.
extend = "../../ruff.toml"
